version: '3.9'

services:
  db:
    image: mariadb:11
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: tshirt_store
      MARIADB_USER: tshirt_user
      MARIADB_PASSWORD: tshirt_password
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      SECRET_KEY: django-secret-key-change-in-prod
      DEBUG: "True"
      DB_NAME: tshirt_store
      DB_USER: tshirt_user
      DB_PASSWORD: tshirt_password
      DB_HOST: db
      DB_PORT: "3306"
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - media_files:/app/media

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    depends_on:
      - backend

volumes:
  mariadb_data:
  media_files:
